<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>TOD-Y - نظام بث الأندرويد المطور</title><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><style>:root{--bg:#06090e;--cd:#111622;--ac:#00e676;--tx:#fff;--mu:#8b9bb4;--pr:#24314b;--dg:#e61e50}*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}body{background:var(--bg);color:var(--tx);overflow-x:hidden}.nb{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#0b0f17;border-bottom:1px solid #1a2233;position:sticky;top:0;z-index:100}.lg{font-size:22px;font-weight:900;cursor:pointer;margin-right:auto;position:absolute;left:50%;transform:translateX(-50%)}.lg span{color:var(--ac)}.menu-btn{font-size:24px;cursor:pointer;color:var(--mu);user-select:none;padding:5px 10px;opacity:.35;transition:opacity .2s}.menu-btn:active,.menu-btn:hover{opacity:1;color:var(--ac)}.mc{padding:15px 4%;max-width:1600px;margin:0 auto;padding-bottom:100px}.st{font-size:16px;margin:15px 0;display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--mu)}.title-container{display:flex;align-items:center;gap:8px}.fifa-title{font-size:16px;font-weight:900;letter-spacing:1px;color:#fff;background:linear-gradient(45deg,#fff,var(--mu));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.fifa-logo-svg{width:24px;height:24px;fill:var(--ac);filter:drop-shadow(0 0 5px rgba(0,230,118,.5))}.bb{font-size:12px;background:var(--pr);padding:4px 8px;border-radius:4px;cursor:pointer;color:var(--ac)}.gl{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}.fi{width:45px;height:32px;background:#ffe082;border-radius:0 4px 4px 4px;position:relative;margin:0 auto}.fi::before{content:'';width:18px;height:6px;background:inherit;border-radius:3px 3px 0 0;position:absolute;top:-6px;left:0}.si{background:#4caf50}.cd{background:var(--cd);border-radius:8px;overflow:hidden;border:1px solid #1a2233;transition:.15s;cursor:pointer;text-align:center;padding:12px 6px}.cd:hover{border-color:var(--ac)}.cih{width:100%;height:50px;display:flex;align-items:center;justify-content:center}.ct{padding-top:8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}.sp{width:36px;height:36px;border:3px solid #1a2233;border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.wc-showcase{display:flex;gap:12px;overflow-x:auto;padding:10px 0;scroll-behavior:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}.wc-showcase::-webkit-scrollbar{display:none}.wc-item{flex:0 0 250px;height:145px;background:var(--cd);border-radius:10px;overflow:hidden;border:1px solid #1a2233;position:relative;box-shadow:0 4px 10px rgba(0,0,0,.2)}.wc-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}.matches-container{display:flex;gap:15px;overflow-x:auto;padding:10px 0;scroll-behavior:auto;scrollbar-width:none}.matches-container::-webkit-scrollbar{display:none}.match-card{flex:0 0 310px;background:linear-gradient(135deg,#111622 0,#1a2233 100%);border:1px solid #24314b;border-radius:12px;padding:12px;position:relative;box-shadow:0 4px 15px rgba(0,0,0,.3)}.match-header{text-align:center;font-size:12px;color:var(--ac);font-weight:700;margin-bottom:10px;border-bottom:1px solid #24314b;padding-bottom:6px}.teams-area{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.team-box{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}.team-flag{width:42px;height:28px;object-fit:cover;border-radius:4px;box-shadow:0 2px 5px rgba(0,0,0,.5);background:#06090e}.team-name{font-size:12px;font-weight:700;max-width:85px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.vs-badge{background:var(--pr);color:var(--mu);padding:4px 8px;border-radius:20px;font-size:10px;font-weight:700}.watch-btn{display:block;width:100%;background:var(--ac);color:#000;text-align:center;padding:8px;border-radius:6px;font-size:12px;font-weight:900;text-decoration:none;transition:.2s}.watch-btn:hover{opacity:.9}.scroll-controls{position:fixed;bottom:25px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:999}.scr-btn{width:46px;height:46px;background:rgba(17,22,34,.85);border:1px solid #24314b;border-radius:50%;color:var(--ac);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5);user-select:none;backdrop-filter:blur(3px);transition:.15s}.scr-btn:active{background:var(--ac);color:#000;border-color:var(--ac);transform:scale(.9)}.dev-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(4,6,10,.95);z-index:2000;justify-content:center;align-items:center;padding:15px;backdrop-filter:blur(5px)}.dev-box{background:var(--cd);border:1px solid #24314b;padding:20px;border-radius:12px;width:100%;max-width:550px;max-height:85vh;overflow-y:auto}.dev-box h3,.dev-box h4{color:var(--ac);margin-bottom:12px;border-bottom:1px solid #24314b;padding-bottom:5px}.dev-box input,.dev-box textarea{width:100%;padding:10px;background:#0b0f17;border:1px solid #1a2233;border-radius:6px;color:#fff;margin-bottom:10px;font-size:13px}.dev-box textarea{height:80px;resize:none;font-family:monospace}.d-btn{width:100%;padding:10px;border:0;border-radius:6px;font-weight:700;cursor:pointer;margin-bottom:8px;font-size:14px}.d-btn.save{background:var(--ac);color:#000}.d-btn.close{background:var(--pr);color:#fff}.m-list{margin-top:15px;max-height:160px;overflow-y:auto;background:#0b0f17;padding:6px;border-radius:6px}.m-list-item{display:flex;justify-content:space-between;align-items:center;background:#111622;padding:6px;border-radius:4px;margin-bottom:6px;font-size:11px}.del-badge{background:var(--dg);color:#fff;padding:2px 6px;border-radius:4px;cursor:pointer;font-weight:700}</style></head><body>
<div id="appMainContent"><div class="nb"><div class="menu-btn" onclick="cDA()">☰</div><div class="lg" onclick="gH()">TOD-<span>Y</span></div></div><div class="mc"><div id="showcaseSection" style="display:none"><div class="st"><div class="title-container"><svg class="fifa-logo-svg" viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm1 17.93V16h-2v3.93A8.005 8.005 0 0 1 4.07 13H8v-2H4.07A8.005 8.005 0 0 1 11 4.07V8h2V4.07A8.005 8.005 0 0 1 19.93 11H16v2h3.93A8.005 8.005 0 0 1 13 19.93zM12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm0 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg><span class="fifa-title">FIFA WORLD CUP</span></div></div><div class="wc-showcase" id="wcShowcase"></div></div><div id="liveMatchesSection" style="display:none"><div class="st">مباريات اليوم الحية ⚽</div><div class="matches-container" id="matchesContainer"></div></div><div id="aC"><div style="display:flex;flex-direction:column;align-items:center;padding:40px 0"><div class="sp"></div></div></div></div></div>
<div class="scroll-controls"><div class="scr-btn" onclick="sPS(-180)">▲</div><div class="scr-btn" onclick="sPS(180)">▼</div></div>
<div class="dev-modal" id="devModal"><div class="dev-box"><h3>لوحة تحكم المطور الفائقة 🛠️</h3><h4>إدارة شاشة العرض 📺</h4><label style="font-size:12px;color:var(--mu)">رابط الصورة:</label><input type="text" id="sIU" placeholder="رابط الصورة المباشر"><button class="d-btn save" style="background:#0d47a1;color:#fff" onclick="uSI()">🖼️ إضافة الصورة</button><div class="m-list" id="dSL"></div><br><h4>إدارة المباريات ⚽</h4><label style="font-size:12px;color:var(--mu)">كود JSON للمباراة:</label><textarea id="mJI" placeholder='{"match":{"title":"البطولة","teams":[{"name":"","flag_url":""},{"name":"","flag_url":""}]}}'></textarea><label style="font-size:12px;color:var(--mu)">رابط البث:</label><input type="text" id="mUI" placeholder="https://..."><button class="d-btn save" onclick="uM()">🚀 حفظ ونشر كرت المباراة</button><div class="m-list" id="dML"></div><button class="d-btn close" onclick="$('devModal').style.display='none'" style="margin-top:15px">إغلاق اللوحة</button></div></div>
<script>
firebase.initializeApp({databaseURL:"https://toty-5ae2c-default-rtdb.firebaseio.com/"});
const db=firebase.database(),$=i=>document.getElementById(i);
let gD={servers:{}},lM={},sI={},v="s",aCId=null,aSId=null,aT={};
window.onload=()=>{
db.ref('tody_multi_stream_data').on('value',s=>{gD=s.val()?.servers?s.val():{servers:{}};rUI()});
db.ref('tody_live_matches_cards').on('value',s=>{lM=s.val()||{};rMC();rDML()});
db.ref('tody_showcase_images').on('value',s=>{sI=s.val()||{};rSI();rDSL()});};
const gH=()=>{v="s";aSId=aCId=null;rUI();},gB=()=>{if(v==="c")v="cat";else if(v==="cat"){v="s";aSId=null}rUI()};

// دالة التشغيل التي تفتح المشغل في صفحة مستقلة مع إضافة زر "إغلاق البث"
function playJustPlayer(u,n){
let pW=window.open("about:blank","_blank");if(!pW)return alert("الرجاء السماح بالنافذة المنبثقة لتشغيل القناة!");
let h=`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${n} - بث مباشر مستمر</title><script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"><\/script><style>html,body{margin:0;padding:0;width:100%;height:100%;background:#06090e;overflow:hidden;display:flex;flex-direction:column;font-family:sans-serif}video{width:100%;flex:1;background:#000;outline:none}.hd{background:#0b0f17;padding:15px;border-bottom:1px solid #1a2233;color:#00e676;font-size:18px;font-weight:700;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.5);padding-left:20px;padding-right:20px}.cl-btn{background:#e61e50;color:#fff;border:0;padding:6px 14px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;transition:0.15s}.cl-btn:active{transform:scale(0.95);opacity:0.9}</style></head><body><div class="hd"><span>${n} - بث مباشر</span><button class="cl-btn" onclick="window.close()">إغلاق البث ✖</button></div><video id="v" controls autoplay playsinline></video><script>const v=document.getElementById('v'),src="${u}";let hls;function initHls(){if(Hls.isSupported()){if(hls)hls.destroy();hls=new Hls({maxMaxBufferLength:30,liveSyncDurationCount:3,maxBufferLength:20,enableWorker:true});hls.loadSource(src);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>v.muted=true));hls.on(Hls.Events.ERROR,(e,data)=>{if(data.fatal){switch(data.type){case Hls.ErrorTypes.NETWORK_ERROR:hls.startLoad();break;case Hls.ErrorTypes.MEDIA_ERROR:hls.recoverMediaError();break;default:setTimeout(initHls,2000);break;}}});}else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=src;v.addEventListener('loadedmetadata',()=>v.play().catch(()=>v.muted=true));}}initHls();setInterval(()=>{if(v.paused===false&&v.readyState<3){v.currentTime+=1.0;v.play().catch(()=>{});}},5000);v.addEventListener('ended',()=>setTimeout(initHls,1000));<\/script></body></html>`;
pW.document.write(h);pW.document.close();}

function cDA(){if(prompt("أدخل رمز المطور:")==="V555")$('devModal').style.display='flex';}
function sPS(a){window.scrollBy({top:a,behavior:'smooth'});}
function uSI(){let u=$('sIU').value.trim();if(!u)return;let i="img_"+Date.now();db.ref('tody_showcase_images/'+i).set({id:i,url:u}).then(()=>$('sIU').value="");}
function rSI(){let c=$('wcShowcase'),k=Object.keys(sI);c.innerHTML="";if(!k.length)return $('showcaseSection').style.display='none';
$('showcaseSection').style.display='block';[...k,...k,...k].forEach(x=>{let d=document.createElement('div');d.className='wc-item';d.innerHTML=`<img src="${sI[x].url}" onerror="this.parentElement.style.display='none'">`;c.appendChild(d);});sIS(c);}
function rDSL(){let l=$('dSL'),k=Object.keys(sI);l.innerHTML=k.length?"":"<div style='color:var(--mu);font-size:11px'>لا توجد صور.</div>";k.forEach(x=>{let r=document.createElement('div');r.className='m-list-item';r.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">رابط: ${sI[x].url}</span><span class="del-badge" onclick="db.ref('tody_showcase_images/${sI[x].id}').remove()">حذف 🗑️</span>`;l.appendChild(r)})}
function uM(){let j=$('mJI').value.trim(),u=$('mUI').value.trim();if(!j||!u)return;try{let p=JSON.parse(j);if(!p.match||p.match.teams.length<2)throw 1;let i="match_"+Date.now();db.ref('tody_live_matches_cards/'+i).set({id:i,title:p.match.title||"مباراة",team1_name:p.match.teams[0].name,team1_flag:p.match.teams[0].flag_url||'',team2_name:p.match.teams[1].name,team2_flag:p.match.teams[1].flag_url||'',url:u}).then(()=>{$('mJI').value=$('mUI').value=""})}catch(e){alert("خطأ JSON!")}}
function rMC(){let c=$('matchesContainer'),k=Object.keys(lM);c.innerHTML="";if(!k.length)return $('liveMatchesSection').style.display='none';
$('liveMatchesSection').style.display='block';let mk=k.length>1?[...k,...k,...k]:k;mk.forEach(x=>{let m=lM[x],d=document.createElement('div');d.className='match-card';d.innerHTML=`<div class="match-header">${m.title}</div><div class="teams-area"><div class="team-box"><img class="team-flag" src="${m.team1_flag}"><div class="team-name">${m.team1_name}</div></div><div class="vs-badge">VS</div><div class="team-box"><img class="team-flag" src="${m.team2_flag}"><div class="team-name">${m.team2_name}</div></div></div><button class="watch-btn" onclick="window.open('${m.url}','_blank')">WATCH NOW</button>`;c.appendChild(d);});sIS(c);}
function rDML(){let l=$('dML'),k=Object.keys(lM);l.innerHTML=k.length?"":"<div style='color:var(--mu);font-size:11px'>لا توجد مباريات.</div>";k.forEach(x=>{let m=lM[x],r=document.createElement('div');r.className='m-list-item';r.innerHTML=`<span><b>${m.team1_name} × ${m.team2_name}</b></span><span class="del-badge" onclick="db.ref('tody_live_matches_cards/${m.id}').remove()">حذف 🗑️</span>`;l.appendChild(r)})}
function sIS(e){if(aT[e.id])clearInterval(aT[e.id]);if(e.children.length<=1)return;aT[e.id]=setInterval(()=>{e.scrollLeft-=1;if(Math.abs(e.scrollLeft)>=(e.scrollWidth/1.5))e.scrollLeft=0},28);}
function rUI(){let c=$('aC');c.innerHTML="";if(v==="s"){c.innerHTML=`<div class="st">السيرفرات المتاحة</div><div class="gl"></div>`;let g=c.querySelector('.gl');for(let i in gD.servers){if(gD.servers[i].visible===!1)continue;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aSId=i;v="cat";rUI()};d.innerHTML=`<div class="cih"><div class="fi si"></div></div><div class="ct">${gD.servers[i].name}</div>`;g.appendChild(d)}}else if(v==="cat"){c.innerHTML=`<div class="st"><span>${gD.servers[aSId].name}</span><span class="bb" onclick="gB()">عودة</span></div><div class="gl"></div>`;let g=c.querySelector('.gl');for(let i in gD.servers[aSId].categories){if(gD.servers[aSId].categories[i].visible===!1)continue;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aCId=i;v="c";rUI()};d.innerHTML=`<div class="cih"><div class="fi"></div></div><div class="ct">${gD.servers[aSId].categories[i].name}</div>`;g.appendChild(d)}}else if(v==="c"){c.innerHTML=`<div class="st"><span>${gD.servers[aSId].categories[aCId].name}</span><span class="bb" onclick="gB()">عودة</span></div><div class="gl"></div>`;let g=c.querySelector('.gl');gD.servers[aSId].channels.filter(x=>x.catId==aCId&&x.visible!==!1).forEach(x=>{let d=document.createElement('div');d.className='cd';d.onclick=()=>{playJustPlayer(x.url,x.name)};d.innerHTML=`<div class="cih">${x.icon.startsWith('http')?`<img src="${x.icon}" style="width:100%;height:50px;object-fit:contain">`:`<div style="font-size:11px;color:var(--ac)">بث</div>`}</div><div class="ct">${x.name}</div>`;g.appendChild(d)})}}
</script></body></html>
