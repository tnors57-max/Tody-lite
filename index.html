<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>TOD-Y - نظام بث الأندرويد المطور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root{ --bg:#06090e; --cd:#111622; --ac:#00e676; --tx:#fff; --mu:#8b9bb4; --pr:#24314b }
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
        body{background:var(--bg);color:var(--tx);overflow-x:hidden}
        .nb{display:flex;justify-content:center;align-items:center;padding:15px;background:#0b0f17;border-bottom:1px solid #1a2233;position:sticky;top:0;z-index:100}
        .lg{font-size:22px;font-weight:900;cursor:pointer}
        .lg span{color:var(--ac)}
        .mc{padding:15px 4%;max-width:1600px;margin:0 auto;padding-bottom: 80px;}
        .st{font-size:17px;margin:15px 0;display:flex;justify-content:space-between;align-items:center}
        .bb{font-size:12px;background:var(--pr);padding:4px 8px;border-radius:4px;cursor:pointer;color:var(--ac)}
        .gl{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
        .fi{width:45px;height:32px;background:#ffe082;border-radius:0 4px 4px 4px;position:relative;margin:0 auto}
        .fi::before{content:'';width:18px;height:6px;background:inherit;border-radius:3px 3px 0 0;position:absolute;top:-6px;left:0}
        .si{background:#4caf50}
        .cd{background:var(--cd);border-radius:8px;overflow:hidden;border:1px solid #1a2233;transition:.15s;cursor:pointer;text-align:center;padding:12px 6px}
        .cih{width:100%;height:50px;display:flex;align-items:center;justify-content:center}
        .ct{padding-top:8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
        .sp{width:36px;height:36px;border:3px solid #1a2233;border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="appMainContent">
    <div class="nb"><div class="lg" onclick="gH()">TOD-<span>Y</span></div></div>
    <div class="mc" id="aC">
        <div style="display:flex;flex-direction:column;align-items:center;padding:40px 0;"><div class="sp"></div></div>
    </div>
</div>

<script>
firebase.initializeApp({databaseURL:"https://yall-taoaqo3-default-rtdb.firebaseio.com/"});
const db=firebase.database(),$=id=>document.getElementById(id);
let gD={servers:{}},v="s",aCId=null,aSId=null;

window.onload=()=>{
    db.ref('tody_multi_stream_data').on('value',s=>{gD=s.val()?.servers?s.val():{servers:{}};rUI();});
};

const gH=()=>{v="s";aSId=aCId=null;rUI();},gB=()=>{if(v==="c"){v="cat"}else if(v==="cat"){v="s";aSId=null}rUI();};

function playJustPlayer(url, name) {
    // نستخدم User-Agent لخداع السيرفر بأنه متصفح نظام، مما يمنع انقطاع البث
    const ua = "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36";
    
    // تعريف نية التشغيل وتمرير إعدادات إضافية للمشغل لضمان استمرارية البث الحي
    const intentUrl = `intent:${url}#Intent;package=com.brouken.player;action=android.intent.action.VIEW;type=video/*;S.title=${encodeURIComponent(name)};S.user_agent=${encodeURIComponent(ua)};B.can_resume=true;end`;
    
    window.location.href = intentUrl;
}

function rUI(){let c=$('aC');c.innerHTML="";if(v==="s"){c.innerHTML=`<div class="st">السيرفرات المتاحة</div><div class="gl"></div>`;let g=c.querySelector('.gl');for(let i in gD.servers){if(gD.servers[i].visible===!1)continue;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aSId=i;v="cat";rUI()};d.innerHTML=`<div class="cih"><div class="fi si"></div></div><div class="ct">${gD.servers[i].name}</div>`;g.appendChild(d)}}else if(v==="cat"){c.innerHTML=`<div class="st"><span>${gD.servers[aSId].name}</span><span class="bb" onclick="gB()">عودة</span></div><div class="gl"></div>`;let g=c.querySelector('.gl');for(let i in gD.servers[aSId].categories){let cat=gD.servers[aSId].categories[i];if(cat.visible===!1)continue;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aCId=i;v="c";rUI()};d.innerHTML=`<div class="cih"><div class="fi"></div></div><div class="ct">${cat.name}</div>`;g.appendChild(d)}}else if(v==="c"){c.innerHTML=`<div class="st"><span>${gD.servers[aSId].categories[aCId].name}</span><span class="bb" onclick="gB()">عودة</span></div><div class="gl"></div>`;let g=c.querySelector('.gl');gD.servers[aSId].channels.filter(ch=>ch.catId==aCId&&ch.visible!==!1).forEach(ch=>{let d=document.createElement('div');d.className='cd';d.onclick=()=>{playJustPlayer(ch.url, ch.name);};d.innerHTML=`<div class="cih">${ch.icon.startsWith('http')?`<img src="${ch.icon}" style="width:100%;height:50px;object-fit:contain">`:`<div style="font-size:11px;color:var(--ac)">بث</div>`}</div><div class="ct">${ch.name}</div>`;g.appendChild(d)})}}
</script>
</body>
</html>
